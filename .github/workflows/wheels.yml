name: Wheels

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD: cp313-*
          CIBW_SKIP: "*-musllinux_*"
          CIBW_TEST_COMMAND: python {project}/tests/smoke_test.py

      - name: Upload wheels
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
